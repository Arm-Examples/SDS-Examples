project:
  description: Playback ML input and output data (and verify output)

  connections:
    - connect: Model Play demo
      provides:
        - CMSIS-RTOS2
      consumes:
        - SDS_REC_PLAY
        - CMSIS_VIO
        - STDIN
        - STDOUT
        - STDERR
        - Heap: 65536

  packs:
    - pack: ARM::CMSIS@^6.2.0-0
    - pack: ARM::CMSIS-RTX@^5.9.0
    - pack: ARM::CMSIS-DSP@1.15.0
    - pack: ARM::CMSIS-NN
      path: ../../../Packs/CMSIS-NN/4.1.0

  components:
    - component: CMSIS:OS Tick:SysTick
    - component: CMSIS:RTOS2:Keil RTX5&Source
    - component: CMSIS:DSP
    - component: CMSIS:NN Lib

  groups:
    - group: Documentation
      files:
        - file: README.md
    - group: Application
      files:
        - file: app_main.c
        - file: sds_control.c
        - file: algorithm.c
        - file: algorithm_ml.cpp
    - group: EI Port
      files:
        - file: ./Port/ei_classifier_porting.cpp
        - file: ./Port/debug_log.cpp

  layers:
    - layer: model/model.clayer.yml
    - layer: $Board-Layer$
      type:  Board
    - layer: $SDS_Interface-Layer$
      type:  SDS_Interface

  output:
    type:
    - map