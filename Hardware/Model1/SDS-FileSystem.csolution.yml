# A solution is a collection of related projects that share same base configuration.
solution:
  created-for: CMSIS-Toolbox@2.8.0
  cdefault:

  # List of tested compilers that can be selected
  select-compiler:
    - compiler: AC6
    - compiler: GCC
    - compiler: IAR

  # List the packs that define the device and/or board.
  packs:
    - pack: ARM::CMSIS
    - pack: ARM::SDS

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type:   STM32H735G-DK_FILESYSTEM
      device: STM32H735IGKx
      board:  STM32H735G-DK:Rev.B
      variables:
        - Board-Layer:         $SolutionDir()$/../../Boards/STM32H735G-DK/Board.clayer.yml
        - SDS_Interface-Layer: $SolutionDir()$/../../SDS_Interface/FileSystem/SDS_Interface.clayer.yml

  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: debug

    - type: Release
      debug: off
      optimize: balanced

  # List output directories
  output-dirs:
    tmpdir:  tmp-fs

  # List related projects.
  projects:
    - project: RecordTest/RecordTest.cproject.yml
#   - project: RecordSensor/RecordSensor.cproject.yml
    - project: Play/Play.cproject.yml

  compiler: AC6
