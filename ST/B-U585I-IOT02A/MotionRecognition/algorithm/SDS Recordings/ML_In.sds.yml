sds:
  name: ML input
  description: Conditioned 3 axes accelerometer data (sampled at 52.0Hz)
  sample-frequency: 52.0
  content:
    - value: x
      type:  float
      scale: 0.1
      unit:  G
    - value: y
      type:  float
      scale: 0.1
      unit:  G
    - value: z
      type:  float
      scale: 0.1
      unit:  G
